name: Nightly Stability
on:
  schedule:
    - cron: '0 3 * * 1-5'   # Weekdays at 3 AM UTC (30m per profile)
    - cron: '0 3 * * 6'     # Saturdays at 3 AM UTC (2h per profile)
  workflow_dispatch:
    inputs:
      duration:
        description: 'Test duration per profile (e.g., 30m, 2h)'
        required: false
        default: '30m'
        type: string

concurrency:
  group: nightly-stability
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  GOFLAGS: "-mod=readonly"

jobs:
  race-detector-sweep:
    name: Race Detector Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Run tests with race detector (3x)
        run: go test -race -count=3 -timeout 45m ./...

  ltx-behavioral-soak:
    name: LTX Behavioral Soak (${{ matrix.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        profile: [low-volume, high-volume, burst-volume]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Build binaries
        run: |
          go build -o bin/litestream ./cmd/litestream
          go build -o bin/litestream-test ./cmd/litestream-test

      - name: Determine duration
        id: config
        run: |
          if [[ -n "${{ inputs.duration }}" ]]; then
            echo "duration=${{ inputs.duration }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.schedule }}" == "0 3 * * 6" ]]; then
            echo "duration=2h" >> $GITHUB_OUTPUT
          else
            echo "duration=30m" >> $GITHUB_OUTPUT
          fi
          echo "Selected duration: $(cat $GITHUB_OUTPUT | grep duration)"

      - name: Run LTX behavioral test (${{ matrix.profile }})
        run: |
          go test -tags 'integration,soak' \
            -run 'TestLTXBehavior$/${{ matrix.profile }}' \
            -v -timeout 170m \
            ./tests/integration/
        env:
          SOAK_KEEP_TEMP: "1"
          SOAK_DURATION: ${{ steps.config.outputs.duration }}

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ltx-behavioral-${{ matrix.profile }}
          path: /tmp/litestream-ltx-behavior-*/
          retention-days: 14

  ltx-snapshot-regression:
    name: LTX Snapshot Regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Build binaries
        run: |
          go build -o bin/litestream ./cmd/litestream
          go build -o bin/litestream-test ./cmd/litestream-test

      - name: Run snapshot regression test
        run: |
          go test -tags 'integration,soak' \
            -run 'TestLTXBehavior_NoExcessiveSnapshots' \
            -v -timeout 20m \
            ./tests/integration/
        env:
          SOAK_KEEP_TEMP: "1"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ltx-snapshot-regression
          path: /tmp/litestream-ltx-behavior-*/
          retention-days: 14

  minio-soak:
    name: MinIO Soak
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Build binaries
        run: |
          go build -o bin/litestream ./cmd/litestream
          go build -o bin/litestream-test ./cmd/litestream-test

      - name: Determine duration
        id: config
        run: |
          if [[ -n "${{ inputs.duration }}" ]]; then
            echo "duration=${{ inputs.duration }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.schedule }}" == "0 3 * * 6" ]]; then
            echo "duration=2h" >> $GITHUB_OUTPUT
          else
            echo "duration=30m" >> $GITHUB_OUTPUT
          fi

      - name: Run MinIO soak test
        run: |
          go test -tags 'integration,soak,docker' \
            -run 'TestMinIOSoak' \
            -v -timeout 170m \
            ./tests/integration/
        env:
          SOAK_KEEP_TEMP: "1"
          SOAK_AUTO_PURGE: "yes"
          SOAK_DURATION: ${{ steps.config.outputs.duration }}

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minio-soak-results
          path: /tmp/litestream-minio-soak-*/
          retention-days: 14

  comprehensive-soak:
    name: Comprehensive Soak
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Build binaries
        run: |
          go build -o bin/litestream ./cmd/litestream
          go build -o bin/litestream-test ./cmd/litestream-test

      - name: Determine duration
        id: config
        run: |
          if [[ -n "${{ inputs.duration }}" ]]; then
            echo "duration=${{ inputs.duration }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.schedule }}" == "0 3 * * 6" ]]; then
            echo "duration=2h" >> $GITHUB_OUTPUT
          else
            echo "duration=30m" >> $GITHUB_OUTPUT
          fi

      - name: Run comprehensive soak test
        run: |
          go test -tags 'integration,soak' \
            -run 'TestComprehensiveSoak' \
            -v -timeout 170m \
            ./tests/integration/
        env:
          SOAK_KEEP_TEMP: "1"
          SOAK_DURATION: ${{ steps.config.outputs.duration }}

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-soak-results
          path: /tmp/litestream-comprehensive-soak-*/
          retention-days: 14

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [race-detector-sweep, ltx-behavioral-soak, ltx-snapshot-regression, minio-soak, comprehensive-soak]
    if: failure() || cancelled()
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Nightly stability failure: ${new Date().toISOString().split('T')[0]}`;

            // Check if an issue already exists for today
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'stability',
              per_page: 100,
            });

            const today = new Date().toISOString().split('T')[0];
            const alreadyExists = existing.data.some(i => i.title.includes(today));
            if (alreadyExists) {
              console.log('Issue already exists for today, skipping creation');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              labels: ['stability', 'bug'],
              body: [
                '## Nightly Stability Failure',
                '',
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Branch:** \`${context.ref}\``,
                `**Commit:** \`${context.sha.substring(0, 8)}\``,
                '',
                'One or more nightly stability tests failed. Check the run artifacts for details.',
                '',
                '### Failed Jobs',
                '',
                '- [ ] Review failure logs',
                '- [ ] Identify root cause',
                '- [ ] Fix or open tracking issue',
              ].join('\n'),
            });
