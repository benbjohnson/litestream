name: Nightly Stability
on:
  schedule:
    - cron: '0 3 * * 1-5'   # Weekdays at 3 AM UTC (short mode)
    - cron: '0 3 * * 6'     # Saturdays at 3 AM UTC (full mode)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode'
        required: true
        default: 'short'
        type: choice
        options:
          - short
          - full
      duration:
        description: 'Override test duration (e.g., 30m, 2h). Ignored in short mode.'
        required: false
        type: string

env:
  GOFLAGS: "-mod=readonly"

jobs:
  race-detector-sweep:
    name: Race Detector Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Run tests with race detector (3x)
        run: go test -race -count=3 -timeout 45m ./...

  ltx-behavioral-soak:
    name: LTX Behavioral Soak (${{ github.event.schedule == '0 3 * * 6' && 'full' || inputs.mode || 'short' }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Build binaries
        run: |
          go build -o bin/litestream ./cmd/litestream
          go build -o bin/litestream-test ./cmd/litestream-test

      - name: Determine test mode
        id: mode
        run: |
          # Saturday schedule or explicit "full" dispatch
          if [[ "${{ github.event.schedule }}" == "0 3 * * 6" ]] || [[ "${{ inputs.mode }}" == "full" ]]; then
            echo "short_flag=" >> $GITHUB_OUTPUT
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "short_flag=-short" >> $GITHUB_OUTPUT
            echo "mode=short" >> $GITHUB_OUTPUT
          fi

      - name: Run LTX behavioral tests
        run: |
          go test -tags 'integration,soak' \
            -run 'TestLTXBehavior$$' \
            ${{ steps.mode.outputs.short_flag }} \
            -v -timeout 150m \
            ./tests/integration/
        env:
          SOAK_KEEP_TEMP: "1"
          SOAK_DURATION: ${{ inputs.duration || '' }}

      - name: Run snapshot regression test
        run: |
          go test -tags 'integration,soak' \
            -run 'TestLTXBehavior_NoExcessiveSnapshots' \
            ${{ steps.mode.outputs.short_flag }} \
            -v -timeout 30m \
            ./tests/integration/
        env:
          SOAK_KEEP_TEMP: "1"
          SOAK_DURATION: ${{ inputs.duration || '' }}

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ltx-behavioral-results-${{ steps.mode.outputs.mode }}
          path: /tmp/litestream-ltx-behavior-*/
          retention-days: 14

  minio-soak:
    name: MinIO Soak (${{ github.event.schedule == '0 3 * * 6' && 'full' || inputs.mode || 'short' }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Build binaries
        run: |
          go build -o bin/litestream ./cmd/litestream
          go build -o bin/litestream-test ./cmd/litestream-test

      - name: Determine test mode
        id: mode
        run: |
          if [[ "${{ github.event.schedule }}" == "0 3 * * 6" ]] || [[ "${{ inputs.mode }}" == "full" ]]; then
            echo "short_flag=" >> $GITHUB_OUTPUT
          else
            echo "short_flag=-short" >> $GITHUB_OUTPUT
          fi

      - name: Run MinIO soak test
        run: |
          go test -tags 'integration,soak,docker' \
            -run 'TestMinIOSoak' \
            ${{ steps.mode.outputs.short_flag }} \
            -v -timeout 150m \
            ./tests/integration/
        env:
          SOAK_KEEP_TEMP: "1"
          SOAK_AUTO_PURGE: "yes"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minio-soak-results
          path: /tmp/litestream-minio-soak-*/
          retention-days: 14

  comprehensive-soak:
    name: Comprehensive Soak (${{ github.event.schedule == '0 3 * * 6' && 'full' || inputs.mode || 'short' }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Build binaries
        run: |
          go build -o bin/litestream ./cmd/litestream
          go build -o bin/litestream-test ./cmd/litestream-test

      - name: Determine test mode
        id: mode
        run: |
          if [[ "${{ github.event.schedule }}" == "0 3 * * 6" ]] || [[ "${{ inputs.mode }}" == "full" ]]; then
            echo "short_flag=" >> $GITHUB_OUTPUT
          else
            echo "short_flag=-short" >> $GITHUB_OUTPUT
          fi

      - name: Run comprehensive soak test
        run: |
          go test -tags 'integration,soak' \
            -run 'TestComprehensiveSoak' \
            ${{ steps.mode.outputs.short_flag }} \
            -v -timeout 150m \
            ./tests/integration/
        env:
          SOAK_KEEP_TEMP: "1"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-soak-results
          path: /tmp/litestream-comprehensive-soak-*/
          retention-days: 14

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [race-detector-sweep, ltx-behavioral-soak, minio-soak, comprehensive-soak]
    if: failure()
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Nightly stability failure: ${new Date().toISOString().split('T')[0]}`;

            // Check if an issue already exists for today
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'stability',
              per_page: 10,
            });

            const today = new Date().toISOString().split('T')[0];
            const alreadyExists = existing.data.some(i => i.title.includes(today));
            if (alreadyExists) {
              console.log('Issue already exists for today, skipping creation');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              labels: ['stability', 'bug'],
              body: [
                '## Nightly Stability Failure',
                '',
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Branch:** \`${context.ref}\``,
                `**Commit:** \`${context.sha.substring(0, 8)}\``,
                '',
                'One or more nightly stability tests failed. Check the run artifacts for details.',
                '',
                '### Failed Jobs',
                '',
                '- [ ] Review failure logs',
                '- [ ] Identify root cause',
                '- [ ] Fix or open tracking issue',
              ].join('\n'),
            });
